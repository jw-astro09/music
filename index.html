<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch MP4 to MP3 ZIP Converter</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 1.5rem; }
        .file-input-wrapper { margin-bottom: 1.5rem; border: 2px dashed #dadce0; padding: 20px; border-radius: 10px; cursor: pointer; }
        #status { margin-top: 1.5rem; font-weight: 500; color: #5f6368; min-height: 1.2em; }
        .progress-container { width: 100%; background-color: #e8eaed; border-radius: 10px; margin: 15px 0; display: none; }
        #progressBar { width: 0%; height: 10px; background-color: #1a73e8; border-radius: 10px; transition: width 0.3s; }
        .btn { background: #1a73e8; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        .btn:hover { background: #1557b0; }
        .btn:disabled { background: #dadce0; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>MP4 일괄 변환 & ZIP</h2>
    <div class="file-input-wrapper" onclick="document.getElementById('uploader').click()">
        <p id="fileNameDisplay">파일을 선택하거나 드래그하세요 (여러 개 가능)</p>
        <input type="file" id="uploader" accept="video/mp4" multiple style="display: none;">
    </div>
    
    <button id="convertBtn" class="btn">변환 및 ZIP 생성</button>
    
    <div class="progress-container" id="progressContainer">
        <div id="progressBar"></div>
    </div>
    <p id="status"></p>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false }); // 로그가 너무 많으면 브라우저가 느려질 수 있어 꺼둠
    const uploader = document.getElementById('uploader');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const fileNameDisplay = document.getElementById('fileNameDisplay');

    uploader.addEventListener('change', () => {
        const count = uploader.files.length;
        fileNameDisplay.innerText = count > 0 ? `${count}개의 파일 선택됨` : "파일을 선택하세요";
    });

    convertBtn.addEventListener('click', async () => {
        const files = uploader.files;
        if (files.length === 0) return alert("파일을 선택해주세요!");

        convertBtn.disabled = true;
        progressContainer.style.display = 'block';
        const zip = new JSZip();

        try {
            if (!ffmpeg.isLoaded()) {
                status.innerText = "엔진 로딩 중...";
                await ffmpeg.load();
            }

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const inputName = 'input.mp4';
                const outputName = 'output.mp3';
                const finalName = file.name.replace(/\.[^/.]+$/, "") + ".mp3";

                status.innerText = `변환 중 (${i + 1}/${files.length}): ${file.name}`;
                progressBar.style.width = `${((i) / files.length) * 100}%`;

                // 가상 파일 시스템 작업
                ffmpeg.FS('writeFile', inputName, await fetchFile(file));
                await ffmpeg.run('-i', inputName, '-vn', '-ab', '192k', outputName);
                
                // 결과물을 메모리에 읽어서 ZIP에 추가
                const data = ffmpeg.FS('readFile', outputName);
                zip.file(finalName, data);

                // 메모리 해제
                ffmpeg.FS('unlink', inputName);
                ffmpeg.FS('unlink', outputName);
            }

            progressBar.style.width = '100%';
            status.innerText = "압축 파일 생성 중...";

            // ZIP 생성 및 다운로드
            const content = await zip.generateAsync({type:"blob"});
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = "converted_mp3_files.zip";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            status.innerText = "모든 작업 완료! ZIP 다운로드됨.";
            status.style.color = "#4CAF50";

        } catch (err) {
            console.error(err);
            status.innerText = "오류 발생! 콘솔을 확인하세요.";
            status.style.color = "red";
        } finally {
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
